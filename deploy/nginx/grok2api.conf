# Nginx reverse proxy for Grok2API (HTTPS only + TLS + WS + SSE + upload/download)
#
# Usage:
# 1) Save as /etc/nginx/conf.d/grok2api.conf
# 2) Change `server_name`, upstream `server`, and certificate file paths
# 3) Run: nginx -t && systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream grok2api_backend {
    # If Nginx and app are on the same host:
    server 127.0.0.1:8000;
    # If using Docker internal DNS, replace with:
    # server grok2api:8000;
    keepalive 64;
}

# HTTPS reverse proxy (HTTP disabled: no listen 80 block)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    # Replace with your certificate files
    ssl_certificate     /xxx;
    ssl_certificate_key /xxx;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Cloudflare Origin Certificate usually does not need (or cannot use) OCSP stapling on origin.
    # Keep it off to avoid: "ssl_stapling ignored, issuer certificate not found".
    ssl_stapling off;
    ssl_stapling_verify off;

    # Enforce HTTPS in browsers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Large upload support (e.g. /v1/images/edits multipart upload)
    client_max_body_size 200m;
    client_body_timeout 300s;

    # Long-running stream / generation requests
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    send_timeout 3600s;

    # Common proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # WebSocket endpoint used by public imagine page
    location = /v1/public/imagine/ws {
        proxy_pass http://grok2api_backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SSE endpoints: disable buffering to avoid delayed streaming
    location ~ ^/v1/(chat/completions|responses|images/generations|public/imagine/sse|public/video/sse|admin/batch/[^/]+/stream)$ {
        proxy_pass http://grok2api_backend;
        proxy_cache off;
        proxy_buffering off;
        gzip off;
        add_header X-Accel-Buffering no always;
        proxy_read_timeout 3600s;
    }

    # Multipart upload endpoint
    location = /v1/images/edits {
        proxy_pass http://grok2api_backend;
        # Stream request body directly to upstream (better for large files)
        proxy_request_buffering off;
        # This endpoint may also stream SSE when stream=true
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        add_header X-Accel-Buffering no always;
        proxy_read_timeout 3600s;
    }

    # File download endpoints
    location ^~ /v1/files/ {
        proxy_pass http://grok2api_backend;
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_read_timeout 3600s;
    }

    # Default HTTP reverse proxy
    location / {
        proxy_pass http://grok2api_backend;
    }
}
